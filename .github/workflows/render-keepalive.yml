name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL || 'https://eventsticketingsystem.onrender.com/api/health/' }}
        run: |
          echo "Pinging $HEALTH_URL"
          curl -fsS -m 20 "$HEALTH_URL" > /dev/null
