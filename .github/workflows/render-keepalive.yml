name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL || 'https://eventsticketingsystem.onrender.com/api/health/' }}
        run: |
          URL="${HEALTH_URL:-https://eventsticketingsystem.onrender.com/api/health/}"
          echo "Pinging $URL"
          # Render free instances can take a while to wake up; retry to avoid false failures.
          curl -fsSL \
            --connect-timeout 10 \
            --max-time 120 \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 10 \
            "$URL" > /dev/null
