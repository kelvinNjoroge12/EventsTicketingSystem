services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strathmore_university}
      POSTGRES_USER: ${POSTGRES_USER:-strathmore_university}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strathmore_university}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  web:
    build:
      context: ..
      dockerfile: strathmore_university_backend/Dockerfile
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./media:/app/strathmore_university_backend/media
    ports:
      - "8000:8000"
    command: >
      sh -c "
        python manage.py migrate &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
      "

  celery:
    build:
      context: ..
      dockerfile: strathmore_university_backend/Dockerfile
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./media:/app/strathmore_university_backend/media
    command: celery -A config worker -l info -c 4

  celery-beat:
    build:
      context: ..
      dockerfile: strathmore_university_backend/Dockerfile
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  postgres_data:
